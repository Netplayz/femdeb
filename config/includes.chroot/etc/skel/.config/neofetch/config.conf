# =============================================================================
#  FemDeb OS — Neofetch Configuration
#  Place in: /etc/skel/.config/neofetch/config.conf
# =============================================================================

# FemDeb custom ASCII art and colors
print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "WM Theme" wm_theme
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    info cols
}

distro_shorthand="off"
os_arch="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
gtk_shorthand="off"
gtk2="on"
gtk3="on"
gtk4="on"
shell_path="off"
shell_version="on"
ip_host="http://ident.me"
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"
music_player="auto"
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

# FemDeb ASCII Art
image_backend="ascii"
image_source="auto"
ascii_distro="Debian"
ascii_colors=(5 13 5 13 5 13)
ascii_bold="on"
