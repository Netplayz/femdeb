name: 🌸 Build FemDeb ISO

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'both'
        type: choice
        options: [standard, nvidia, both]

jobs:
  # ── Standard ISO ─────────────────────────────────────────────────────────────
  build-standard:
    name: Build Standard ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged --security-opt seccomp=unconfined
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'standard' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Network & DNS Overhaul
        run: |
          # Fix MTU to prevent packet loss during debootstrap
          ip link set dev eth0 mtu 1400 || true
          # Force Cloudflare DNS
          echo "nameserver 1.1.1.1" > /etc/resolv.conf
          echo "nameserver 1.0.0.1" >> /etc/resolv.conf

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring eatmydata

      - name: 🔧 Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 🏗️ Configure live-build (standard)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org \
            --mirror-chroot http://deb.debian.org \
            --mirror-binary http://deb.debian.org \
            --mirror-binary-security http://security.debian.org \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (standard)
        run: |
          # Try up to 3 times in case of transient mirror failures
          for i in {1..3}; do
            echo "Attempt $i..."
            eatmydata lb build && break || lb clean --binary
            sleep 10
          done
        timeout-minutes: 90

      - name: 📋 Rename and hash ISO (standard)
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          mv *.iso "output/femdeb-${VERSION}-amd64.iso" 2>/dev/null || \
          mv *.hybrid.iso "output/femdeb-${VERSION}-amd64.iso" 2>/dev/null || true
          sha256sum output/*.iso > output/SHA256SUMS-standard

      - name: 📤 Upload standard ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-standard-iso
          path: output/
          retention-days: 7

  # ── NVIDIA ISO ────────────────────────────────────────────────────────────────
  build-nvidia:
    name: Build NVIDIA ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged --security-opt seccomp=unconfined
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'nvidia' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Network & DNS Overhaul
        run: |
          ip link set dev eth0 mtu 1400 || true
          echo "nameserver 1.1.1.1" > /etc/resolv.conf

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring eatmydata

      - name: 🏗️ Configure live-build (NVIDIA)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org \
            --mirror-chroot http://deb.debian.org \
            --mirror-binary http://deb.debian.org \
            --mirror-binary-security http://security.debian.org \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS (NVIDIA)" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb-NV" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (NVIDIA)
        run: |
          for i in {1..3}; do
            echo "Attempt $i..."
            eatmydata lb build && break || lb clean --binary
            sleep 10
          done
        timeout-minutes: 120

      - name: 📋 Rename and hash ISO (NVIDIA)
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          mv *.iso "output/femdeb-${VERSION}-nvidia-amd64.iso" 2>/dev/null || \
          mv *.hybrid.iso "output/femdeb-${VERSION}-nvidia-amd64.iso" 2>/dev/null || true
          sha256sum output/*.iso > output/SHA256SUMS-nvidia

      - name: 📤 Upload NVIDIA ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-nvidia-iso
          path: output/
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-standard, build-nvidia]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          pattern: femdeb-*-iso
          merge-multiple: true

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🌸 FemDeb OS ${{ github.ref_name }}
            ISO images are ready for download.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
