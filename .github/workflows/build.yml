name: 🌸 Build FemDeb ISO

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'both'
        type: choice
        options: [standard, nvidia, both]

jobs:
  # ── Standard ISO ─────────────────────────────────────────────────────────────
  build-standard:
    name: Build Standard ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged --security-opt seccomp=unconfined
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'standard' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Network & DNS Overhaul
        run: |
          ip link set dev eth0 mtu 1400 || true
          echo "nameserver 1.1.1.1" > /etc/resolv.conf
          echo "nameserver 1.0.0.1" >> /etc/resolv.conf

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring eatmydata

      - name: 🔍 Verify mirror connectivity
        run: |
          curl -fsSL http://deb.debian.org/debian/dists/bookworm/Release -o /dev/null \
            && echo "Mirror OK" \
            || (echo "Mirror UNREACHABLE — aborting" && exit 1)

      - name: 🔧 Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 🏗️ Configure live-build (standard)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --mirror-binary http://deb.debian.org/debian \
            --mirror-binary-security http://security.debian.org/debian-security \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (standard)
        shell: bash
        run: |
          for i in {1..3}; do
            echo "Attempt $i..."
            if eatmydata lb build; then
              echo "Build succeeded on attempt $i"
              break
            else
              echo "Attempt $i failed, cleaning and retrying..."
              lb clean
              sleep 15
            fi
            if [[ $i -eq 3 ]]; then
              echo "All 3 attempts failed."
              exit 1
            fi
          done
        timeout-minutes: 90

      - name: 📋 Rename and hash ISO (standard)
        shell: bash
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          ISO=$(ls *.iso *.hybrid.iso 2>/dev/null | head -n1)
          if [[ -z "$ISO" ]]; then
            echo "No ISO found after build!"
            exit 1
          fi
          mv "$ISO" "output/femdeb-${VERSION}-amd64.iso"
          sha256sum output/*.iso > output/SHA256SUMS-standard
          echo "Built: output/femdeb-${VERSION}-amd64.iso"

      - name: 📤 Upload standard ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-standard-iso
          path: output/
          retention-days: 7

  # ── NVIDIA ISO ────────────────────────────────────────────────────────────────
  build-nvidia:
    name: Build NVIDIA ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged --security-opt seccomp=unconfined
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'nvidia' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Network & DNS Overhaul
        run: |
          ip link set dev eth0 mtu 1400 || true
          echo "nameserver 1.1.1.1" > /etc/resolv.conf
          echo "nameserver 1.0.0.1" >> /etc/resolv.conf

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring eatmydata

      - name: 🔍 Verify mirror connectivity
        run: |
          curl -fsSL http://deb.debian.org/debian/dists/bookworm/Release -o /dev/null \
            && echo "Mirror OK" \
            || (echo "Mirror UNREACHABLE — aborting" && exit 1)

      - name: 🔧 Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 💾 Inject NVIDIA package list
        run: |
          mkdir -p config/package-lists
          cat > config/package-lists/nvidia.list.chroot << 'EOF'
          nvidia-driver
          nvidia-kernel-dkms
          nvidia-settings
          nvidia-smi
          firmware-misc-nonfree
          linux-headers-amd64
          EOF

      - name: 🏗️ Configure live-build (NVIDIA)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --mirror-binary http://deb.debian.org/debian \
            --mirror-binary-security http://security.debian.org/debian-security \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS (NVIDIA)" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb-NV" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (NVIDIA)
        shell: bash
        run: |
          for i in {1..3}; do
            echo "Attempt $i..."
            if eatmydata lb build; then
              echo "Build succeeded on attempt $i"
              break
            else
              echo "Attempt $i failed, cleaning and retrying..."
              lb clean
              sleep 15
            fi
            if [[ $i -eq 3 ]]; then
              echo "All 3 attempts failed."
              exit 1
            fi
          done
        timeout-minutes: 120

      - name: 📋 Rename and hash ISO (NVIDIA)
        shell: bash
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          ISO=$(ls *.iso *.hybrid.iso 2>/dev/null | head -n1)
          if [[ -z "$ISO" ]]; then
            echo "No ISO found after build!"
            exit 1
          fi
          mv "$ISO" "output/femdeb-${VERSION}-nvidia-amd64.iso"
          sha256sum output/*.iso > output/SHA256SUMS-nvidia
          echo "Built: output/femdeb-${VERSION}-nvidia-amd64.iso"

      - name: 📤 Upload NVIDIA ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-nvidia-iso
          path: output/
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-standard, build-nvidia]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.build-standard.result == 'success' || needs.build-standard.result == 'skipped') &&
      (needs.build-nvidia.result == 'success' || needs.build-nvidia.result == 'skipped')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          pattern: femdeb-*-iso
          merge-multiple: true

      - name: 📋 List release files
        run: ls -lh release/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🌸 FemDeb OS ${{ github.ref_name }}

            ISO images are ready for download.

            | Variant  | File |
            |----------|------|
            | Standard | `femdeb-${{ github.ref_name }}-amd64.iso` |
            | NVIDIA   | `femdeb-${{ github.ref_name }}-nvidia-amd64.iso` |

            Verify your download with the included `SHA256SUMS-*` files.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
