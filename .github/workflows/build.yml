name: 🌸 Build FemDeb ISO

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'both'
        type: choice
        options:
          - standard
          - nvidia
          - both

jobs:
  # ── Standard ISO ─────────────────────────────────────────────────────────────
  build-standard:
    name: Build Standard ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'standard' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring

      - name: 🔧 Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 🏗️ Configure live-build (standard)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org \
            --mirror-chroot http://deb.debian.org \
            --mirror-binary http://deb.debian.org \
            --mirror-binary-security http://security.debian.org \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (standard)
        run: lb build
        timeout-minutes: 90

      - name: 📋 Rename and hash ISO (standard)
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          mv *.iso "output/femdeb-${VERSION}-amd64.iso" 2>/dev/null || \
          mv *.hybrid.iso "output/femdeb-${VERSION}-amd64.iso" 2>/dev/null || true
          sha256sum output/*.iso > output/SHA256SUMS-standard

      - name: 📤 Upload standard ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-standard-iso
          path: output/
          retention-days: 7

  # ── NVIDIA ISO ────────────────────────────────────────────────────────────────
  build-nvidia:
    name: Build NVIDIA ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.variant == 'nvidia' ||
      github.event.inputs.variant == 'both'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install live-build and dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
            rsync curl git ca-certificates debian-archive-keyring

      - name: 🔧 Make scripts executable
        run: |
          chmod +x scripts/*.sh
          [ -f config/hooks/normal/0200-femdeb-nvidia.hook.chroot ] && chmod +x config/hooks/normal/0200-femdeb-nvidia.hook.chroot

      - name: 🏗️ Configure live-build (NVIDIA)
        run: |
          lb config \
            --distribution bookworm \
            --mirror-bootstrap http://deb.debian.org \
            --mirror-chroot http://deb.debian.org \
            --mirror-binary http://deb.debian.org \
            --mirror-binary-security http://security.debian.org \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui true \
            --bootloader grub-efi \
            --binary-images iso-hybrid \
            --iso-application "FemDeb OS (NVIDIA)" \
            --iso-publisher "FemDeb Project" \
            --iso-volume "FemDeb-NV" \
            --memtest none \
            --win32-loader false \
            --checksums sha256

      - name: 🌸 Build ISO (NVIDIA)
        run: lb build
        timeout-minutes: 120

      - name: 📋 Rename and hash ISO (NVIDIA)
        run: |
          mkdir -p output
          VERSION="${{ github.ref_name }}"
          [[ "$VERSION" == "main" ]] && VERSION="dev-$(date +%Y%m%d)"
          mv *.iso "output/femdeb-${VERSION}-nvidia-amd64.iso" 2>/dev/null || \
          mv *.hybrid.iso "output/femdeb-${VERSION}-nvidia-amd64.iso" 2>/dev/null || true
          sha256sum output/*.iso > output/SHA256SUMS-nvidia

      - name: 📤 Upload NVIDIA ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: femdeb-nvidia-iso
          path: output/
          retention-days: 7

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-standard, build-nvidia]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download standard ISO
        uses: actions/download-artifact@v4
        with:
          name: femdeb-standard-iso
          path: release/

      - name: 📥 Download NVIDIA ISO
        uses: actions/download-artifact@v4
        with:
          name: femdeb-nvidia-iso
          path: release/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🌸 FemDeb OS ${{ github.ref_name }}

            Two ISO variants are available:


            | Variant | File | Use |
            |---------|------|-----|
            | **Standard** | `femdeb-*-amd64.iso` | AMD / Intel GPU, or open-source drivers |
            | **NVIDIA** | `femdeb-*-nvidia-amd64.iso` | Proprietary NVIDIA driver pre-installed |

            ### Installation
            ```bash
            # Flash to USB (replace /dev/sdX with your drive)
            sudo dd if=femdeb-*.iso of=/dev/sdX bs=4M status=progress oflag=sync
            ```
            Boot from USB and follow the Calamares installer.

            ### Checksums
            Verify with `sha256sum -c SHA256SUMS-standard` or `sha256sum -c SHA256SUMS-nvidia`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
